# Netlify deployment config for TanStack Start app
# Uses Nitro's "netlify" preset to output serverless functions + static assets.

[build]
  command = "DEPLOY_TARGET=netlify bun run build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "20"
  DEPLOY_TARGET = "netlify"

# Nitro emits the function bundle and _redirects into .netlify/ and dist/.
# No custom redirects needed — the preset handles SSR routing.
